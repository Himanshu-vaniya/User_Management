<div class="users-container">
  <mat-card class="users-card">
    <mat-card-header>
      <mat-card-title>Users Management</mat-card-title>
      <span class="spacer"></span>
      <button mat-raised-button color="primary" (click)="onAddUser()">
        <mat-icon>add</mat-icon>
        Add User
      </button>
    </mat-card-header>

    <mat-card-content>
      <!-- Search Bar -->
      <div class="search-bar-container" *ngIf="!isLoading && !errorMessage && dataSource.data.length > 0">
        <app-search-box 
          placeholder="Search by name, email, or role..." 
          (search)="onSearch($event)" 
          (clear)="onSearch('')">
        </app-search-box>
      </div>

      <!-- Loading State -->
      <div class="loading-state" *ngIf="isLoading">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <!-- Error State -->
      <div class="error-state" *ngIf="errorMessage && !isLoading">
        <mat-icon color="warn">error</mat-icon>
        <p>{{ errorMessage }}</p>
        <button mat-stroked-button (click)="loadUsers()">Retry</button>
      </div>

      <!-- Empty State -->
      <app-empty-state 
        *ngIf="!isLoading && !errorMessage && (dataSource.data.length === 0 || dataSource.filteredData.length === 0)"
        [icon]="dataSource.data.length === 0 ? 'people_outline' : 'search_off'"
        [title]="dataSource.data.length === 0 ? 'No users found' : 'No matches found'"
        [description]="dataSource.data.length === 0 ? 'Try adding a new user to get started.' : 'No users match your search query. Try clearing or editing your search.'"
        [actionText]="dataSource.data.length === 0 ? 'Add User' : ''"
        (action)="onAddUser()">
      </app-empty-state>

      <!-- Table State -->
      <div class="table-container" *ngIf="!isLoading && !errorMessage && dataSource.filteredData.length > 0">
        <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z0">
          
          <!-- Name Column -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
            <td mat-cell *matCellDef="let user"> {{ user.firstName }} {{ user.lastName }} </td>
          </ng-container>

          <!-- Email Column -->
          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Email </th>
            <td mat-cell *matCellDef="let user"> {{ user.email }} </td>
          </ng-container>

          <!-- Role Column -->
          <ng-container matColumnDef="role">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Role </th>
            <td mat-cell *matCellDef="let user"> {{ user.role }} </td>
          </ng-container>

          <!-- Active Column -->
          <ng-container matColumnDef="active">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Active </th>
            <td mat-cell *matCellDef="let user"> 
              <mat-icon [color]="user.active ? 'primary' : 'warn'">
                {{ user.active ? 'check_circle' : 'cancel' }}
              </mat-icon>
            </td>
          </ng-container>

          <!-- Actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef> Actions </th>
            <td mat-cell *matCellDef="let user">
              <button mat-icon-button color="primary" matTooltip="Edit User" (click)="onEditUser(user)">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" matTooltip="Delete User" (click)="onDeleteUser(user)">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <!-- Paginator -->
        <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons class="mat-elevation-z0"></mat-paginator>
      </div>
    </mat-card-content>
  </mat-card>
</div>
