<div class="confirm-dialog-container">
  <div class="dialog-header">
    <mat-icon color="warn" class="warning-icon">warning</mat-icon>
    <h2 mat-dialog-title class="dialog-title">{{ data.title }}</h2>
  </div>

  <mat-dialog-content class="dialog-content">
    <p class="confirm-message">{{ data.message }}</p>
    <div *ngIf="data.itemName" class="item-name-container">
      <span class="item-name">{{ data.itemName }}</span>
    </div>
    <p class="warning-text">This action cannot be undone.</p>
  </mat-dialog-content>

  <mat-dialog-actions align="end" class="dialog-actions">
    <button mat-button (click)="onCancel()" [disabled]="isLoading">
      {{ data.cancelText || 'Cancel' }}
    </button>
    <button 
      mat-raised-button 
      [color]="data.confirmColor || 'warn'" 
      (click)="onConfirm()" 
      [disabled]="isLoading">
      <div class="button-content">
        <mat-spinner diameter="18" *ngIf="isLoading" class="button-spinner"></mat-spinner>
        <span>{{ data.confirmText || 'Delete' }}</span>
      </div>
    </button>
  </mat-dialog-actions>
</div>
